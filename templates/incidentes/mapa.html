{% extends 'base.html' %}
{% load static %}

{% block head_extra %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<style>
  #map { height: 650px; }
  @media (max-width: 768px) { #map { height: 400px; } }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h2 class="text-primary fw-bold mb-1"><i class="bi bi-map-fill"></i> Mapa de Incidentes</h2>
        <p class="text-muted">Incidentes reportados en Santa Cruz de la Sierra.</p>
    </div>
</div>
<div class="card border-0 shadow-sm p-2 mb-4">
    <div id="map" class="rounded-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
(function() {
    var el = document.getElementById('map');
    if (!el || typeof L === 'undefined') { console.error('Leaflet no disponible'); return; }

    var map = L.map(el).setView([-17.7833, -63.1821], 12);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
        attribution: '&copy; Google', maxZoom: 20
    }).addTo(map);

    var u = new URLSearchParams(window.location.search);
    var targetLat = u.get('lat'), targetLng = u.get('lng');

    if (targetLat && targetLng)
        map.setView([parseFloat(targetLat), parseFloat(targetLng)], 17);

    fetch('/incidentes/api/mapa/')
        .then(function(r) { return r.json(); })
        .then(function(puntos) {
            console.log('Incidentes cargados por API:', puntos.length);
            puntos.forEach(function(p) {
                var color = p.tipo.indexOf('Robo') !== -1 ? 'red' :
                            p.tipo.indexOf('Asalto') !== -1 ? 'orange' : 'blue';
                var popup = '<b style="color:' + color + '">' + p.titulo + '</b><br>' +
                    '<small><b>Tipo:</b> ' + p.tipo + ' | <b>Sector:</b> ' + p.sector + '</small><br>' +
                    '<small>' + p.desc + '</small>';
                if (p.img)
                    popup += '<br><img src="' + p.img + '" style="max-height:120px;max-width:100%;border-radius:6px;margin-top:4px">';
                var marker = L.circleMarker([p.lat, p.lng], {
                    radius: 8, fillColor: color, color: '#000', weight: 1, fillOpacity: 0.7
                }).addTo(map).bindPopup(popup, {maxWidth:300});
                if (targetLat && String(p.lat) === targetLat && String(p.lng) === targetLng)
                    setTimeout(function() { marker.openPopup(); }, 600);
            });
        })
        .catch(function(e) { console.error('Error API mapa:', e); });

    setTimeout(function() { map.invalidateSize(); }, 300);
})();
</script>
{% endblock %}
