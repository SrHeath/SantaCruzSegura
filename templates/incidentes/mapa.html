{% extends 'base.html' %}
{% load static %}

{% block head_extra %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<style>
  #map { height: 650px; }
  @media (max-width: 768px) { #map { height: 400px; } }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h2 class="text-primary fw-bold mb-1"><i class="bi bi-map-fill"></i> Mapa de Incidentes</h2>
        <p class="text-muted">Incidentes reportados en Santa Cruz de la Sierra.</p>
    </div>
</div>
<div class="card border-0 shadow-sm p-2 mb-4">
    <div id="map" class="rounded-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
(function() {
    var el = document.getElementById('map');
    if (!el || typeof L === 'undefined') { console.error('Leaflet no cargó'); return; }

    var map = L.map(el).setView([-17.7833, -63.1821], 12);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
        attribution: '© Google', maxZoom: 20
    }).addTo(map);

    var puntos = [
        {% for i in incidentes %}
        {% if i.latitud and i.longitud %}
        { lat: {{ i.latitud|unlocalize }}, lng: {{ i.longitud|unlocalize }}, titulo: "{{ i.titulo|escapejs }}", tipo: "{{ i.tipo.nombre|escapejs }}", sector: "{{ i.sector.nombre|escapejs }}", desc: "{{ i.descripcion|escapejs }}" },
        {% endif %}
        {% endfor %}
    ];

    console.log('Incidentes a mostrar:', puntos.length);

    puntos.forEach(function(p) {
        var color = p.tipo.indexOf('Robo') !== -1 ? 'red' :
                    p.tipo.indexOf('Asalto') !== -1 ? 'orange' : 'blue';
        L.marker([p.lat, p.lng]).addTo(map).bindPopup(
            '<b style="color:' + color + '">' + p.titulo + '</b><br>' +
            '<small><b>Tipo:</b> ' + p.tipo + ' | <b>Sector:</b> ' + p.sector + '</small><br>' +
            '<small>' + p.desc + '</small>'
        );
    });

    var u = new URLSearchParams(window.location.search);
    if (u.get('lat') && u.get('lng'))
        map.setView([parseFloat(u.get('lat')), parseFloat(u.get('lng'))], 17);

    setTimeout(function() { map.invalidateSize(); }, 300);
})();
</script>
{% endblock %}
