{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg p-4">
            <div class="text-center mb-4">
                <span class="d-inline-flex p-3 rounded-circle bg-primary bg-opacity-10 text-primary mb-3">
                    <i class="bi bi-person-plus-fill" style="font-size: 2.5rem;"></i>
                </span>
                <h2 class="fw-bold mb-1">Crear Usuario</h2>
                <p class="text-muted">Registra un nuevo usuario en la plataforma</p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex gap-2 mt-4">
                    <a href="{% url 'usuario_lista' %}" class="btn btn-outline-secondary w-50">Cancelar</a>
                    <button type="submit" class="btn btn-primary w-50">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% block extra_js %}{% endblock %}
{% endblock %}
